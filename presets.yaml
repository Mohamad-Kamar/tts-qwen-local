presets:
  # Apple Silicon daily-use default. MLX + larger chunking was the best practical
  # path in local testing for long study audio on this machine class.
  study-fast:
    profile: fast
    backend: mlx
    voice: Ryan
    language: en
    format: wav
    chunk_chars: 900

  # Use this when you explicitly want a stronger preset speaker and can accept
  # a slower run than study-fast.
  study-quality:
    profile: quality
    backend: mlx
    voice: Ryan
    language: en
    format: wav
    chunk_chars: 900
    instruct: "Deep, calm, mature male narrator with warm resonance, clear diction, measured pacing, and steady educational delivery."

  # Design mode requires an instruction string. Keep this as a deliberate,
  # slower preset rather than the default everyday path.
  study-design-calm:
    profile: design
    backend: mlx
    language: en
    format: wav
    chunk_chars: 900
    instruct: "Calm, clear, steady educational narration with warm pacing."

  # Use this when you want a deeper, more authoritative lesson narrator without
  # imitating a real person.
  study-lesson-narrator:
    profile: design
    backend: mlx
    language: en
    format: wav
    chunk_chars: 900
    instruct: "Deep, calm, mature male narrator with warm resonance, measured pacing, clear diction, and steady educational delivery for long educational lessons."
